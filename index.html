<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            transition: background-color 400ms linear;
        }

        #app {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            font-family: "JetBrains Mono", monospace;
            font-optical-sizing: auto;
            font-weight: 200;
            font-size: 24pt;

            border: 0.1rem solid;
            border-radius: 0.35rem;
            padding: 0.75em 1.5em;

            background-color: inherit;
            color: inherit;

            box-shadow: 4px 4px 0px 0px;

            transform: skewY(30deg) skewX(-30deg) translateX(-2px) translateY(-2px);
            transition: all 100ms linear;

            cursor: pointer;
        }

        .btn:active {
            transform: skewY(30deg) skewX(-30deg) translateX(0px) translateY(0px);
            box-shadow: 0 0;
        }
    </style>
</head>

<body>
    <main id="app">
        <button id="btn" class="btn">Contrast</button>
    </main>
    <script>
        const btn = document.getElementById('btn');

        let current_bg = 'white';

        btn.addEventListener('mousedown', () => {
            if (current_bg == 'black') {
                document.body.style.backgroundColor = 'white';
                document.body.style.color = 'black';
                current_bg = 'white';
            }
            else {
                document.body.style.backgroundColor = 'black'
                document.body.style.color = 'white'
                current_bg = 'black';
            }
        });
    </script>
</body>

</html>
